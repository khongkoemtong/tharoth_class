<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>


    <div class="d-flex justify-content-end m-5">
        <button data-bs-toggle="modal" data-bs-target="#insert" class="btn btn-primary">Add Student</button>
    </div>

    <div class="modal fade" id="insert">
        <div class="modal-dialog">
            <div class="modal-content">
               
                <form action="/insert" method="post"  class="p-4">
                     <p class="text-center fs-3 fw-bold ">Add Student </p>
                    <div>
                        <label for="" class="form-label">Enter name </label>
                        <input name="name" class="form-control" type="text">
                    </div>
                     <div>
                        <label for="" class="form-label">Enter age </label>
                        <input name="age" class="form-control" type="text">
                    </div>
                     <div>
                        <label for="" class="form-label">Enter gender </label>
                        <input name="gender" class="form-control" type="text">
                    </div>


                    <div class="mt-3">
                        <button class="btn btn-danger ">Cancel</button>
                        <button class="btn btn-primary" type="submit">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <table border="" class="table table-hover table-bordered w-75" align="center" cellspacing="0" width="900px" cellpadding="15px">
        <tr>
            <th>ID</th>
            <th>NAME</th>
            <th>AGE</th>
            <th>GENDER</th>
        </tr>

          {%  for mydata  in mystudent  %}
          <tr>

            <th>{{mydata[0]}}</th>
            <th>{{mydata[1]}}</th>
            <th>{{mydata[2]}}</th>
            <th>{{mydata[3]}}</th>

          </tr>




          {% endfor %}


    </table>


  


    
</body>
</html>
